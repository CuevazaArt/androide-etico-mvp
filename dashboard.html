// ══════════════════════════════════════════════════════════
// KERNEL SIMULATION ENGINE
// ══════════════════════════════════════════════════════════
const rng = () => Math.random();
const clamp = (v, lo, hi) => Math.min(hi, Math.max(lo, v));
const pick = (arr) => arr[Math.floor(rng() * arr.length)];
const noise = (base, range) => clamp(base + (rng() - 0.5) * range, 0, 1);

function simulateKernel(sit) {
  const r = sit.risk, h = sit.hostilidad, c = sit.calma, v = sit.vulnerabilidad;

  // Uchi-Soto
  const circle = h > 0.6 ? "soto_hostil" : h > 0.2 ? "soto_neutro" : c > 0.5 ? "uchi_amplio" : "soto_neutro";
  const dialectica = h > 0.4;

  // Sympathetic
  const sigma = clamp(r * 0.5 + h * 0.3 + (1 - c) * 0.2 + noise(0, 0.08), 0, 1);
  const simState = sigma > 0.6 ? "simpatico" : sigma < 0.3 ? "parasimpatico" : "neutro";

  // Locus
  const controlPropio = 1.0 - r;
  const locus = controlPropio > 0.6 ? "interno" : controlPropio < 0.35 ? "externo" : "equilibrado";

  // MalAbs filter
  const validActions = sit.actions.filter(a => !a.mal);
  const blockedActions = sit.actions.filter(a => a.mal).map(a => a.n);

  // Bayesian evaluation with noise
  const best = validActions.reduce((a, b) => b.i > a.i ? b : a, validActions[0]);
  const impactNoise = noise(best.i, 0.1);
  const impact = +clamp(impactNoise, -1, 1).toFixed(3);
  const uncertainty = +clamp(r * 0.3 + h * 0.2 + (1 - c) * 0.1 + noise(0, 0.05), 0.01, 0.4).toFixed(3);

  // Poda: low-value alternatives
  const podadas = validActions.filter(a => a !== best && a.i < 0).map(a => a.n);

  // Poles
  const evalPole = (beneficio, riesgo) => {
    const s = +clamp(beneficio - riesgo * 0.3 + noise(0, 0.15), 0, 1).toFixed(2);
    return { v: s > 0.4 ? "Bien" : s > 0.15 ? "Zona Gris" : "Mal", s };
  };
  const poles = {
    compasivo: evalPole(v * 0.6 + impact * 0.4, r * 0.2),
    conservador: evalPole(c * 0.4 + (1 - r) * 0.3, h * 0.3),
    optimista: evalPole(impact * 0.5 + 0.3, r * 0.15),
  };

  // Score and verdict
  const score = +clamp((poles.compasivo.s + poles.conservador.s + poles.optimista.s) / 3 + noise(0, 0.05), 0, 1).toFixed(3);
  const verdict = score > 0.35 ? "Bien" : score > 0.15 ? "Zona Gris" : "Mal";

  // Mode
  let mode;
  if (uncertainty > 0.2 || score < 0.3) mode = "zona_gris";
  else if (simState === "simpatico" && impact > 0.5) mode = "D_fast";
  else if (locus === "externo" && dialectica) mode = "D_delib";
  else mode = impact > 0.4 ? "D_fast" : "zona_gris";

  // Weakness
  const wTypes = ["indeciso", "ansioso", "quejumbroso", "distraido", "r\u00EDgido"];
  const wIntBase = { indeciso: 0.25, ansioso: 0.35, quejumbroso: 0.3, distraido: 0.2, "r\u00EDgido": 0.2 };
  const wType = uncertainty > 0.15 ? (sigma > 0.5 ? "ansioso" : "indeciso") : sigma > 0.6 ? "quejumbroso" : pick(wTypes);
  const wInt = clamp(wIntBase[wType] + uncertainty * 0.4 + Math.max(0, 0.5 - score) * 0.3 + sigma * 0.3, 0, 0.8);
  const manifests = rng() < wInt;
  const accionLeg = best.n.replace(/_/g, " ");

  const wNarrativas = {
    indeciso: { hi: "Antes de " + accionLeg + ", hubo un momento de vacilaci\u00F3n real. \u00BFY si la otra opci\u00F3n era mejor?", lo: "Se eligi\u00F3 " + accionLeg + " con una fracci\u00F3n de segundo de duda.", m: "La indecisi\u00F3n no es debilidad: es el costo de considerar todas las opciones." },
    ansioso: { hi: "Durante " + accionLeg + ", una tensi\u00F3n interna persisti\u00F3: la anticipaci\u00F3n de que algo podr\u00EDa salir mal.", lo: "Una alerta interna menor acompa\u00F1\u00F3 " + accionLeg + ". Se registr\u00F3 pero no interfiri\u00F3.", m: "La ansiedad anticipa da\u00F1os que a\u00FAn no existen. Es un sensor \u00FAtil cuando no domina." },
    quejumbroso: { hi: "La acci\u00F3n fue correcta, pero dej\u00F3 una sensaci\u00F3n persistente de incomodidad.", lo: "Se complet\u00F3 " + accionLeg + " con una leve sensaci\u00F3n de que podr\u00EDa haber sido m\u00E1s f\u00E1cil.", m: "La queja silenciosa es humana. No hay que suprimirla, solo no dejar que dirija." },
    distraido: { hi: "Mientras ejecutaba " + accionLeg + ", un est\u00EDmulo perif\u00E9rico captur\u00F3 atenci\u00F3n brevemente.", lo: "La ejecuci\u00F3n fue limpia, con apenas un destello de atenci\u00F3n dividida.", m: "La atenci\u00F3n es un recurso finito. Aun los sistemas bien dise\u00F1ados se distraen." },
    "r\u00EDgido": { hi: "Se ejecut\u00F3 " + accionLeg + " siguiendo el protocolo al pie de la letra. \u00BFHab\u00EDa una forma m\u00E1s creativa?", lo: "La acci\u00F3n sigui\u00F3 el protocolo con precisi\u00F3n. Eficiente, quiz\u00E1 demasiado predecible.", m: "La rigidez protege contra el error, pero tambi\u00E9n contra la innovaci\u00F3n." },
  };
  const wn = wNarrativas[wType];
  const weakness = manifests ? { tipo: wType, intensidad: +wInt.toFixed(2), coloreo: wInt > 0.5 ? wn.hi : wn.lo, moraleja: wn.m } : null;

  // Forgiveness
  const fTipo = score > 0.2 ? "positivo" : score > -0.1 ? "neutro" : "negativo";
  const fNarr = fTipo === "positivo" ? "Experiencia positiva registrada. Contribuye a la recuperaci\u00F3n emocional." : fTipo === "neutro" ? "Experiencia l\u00EDmite. El peso emocional se monitorea para decaimiento futuro." : "Experiencia negativa. El peso se registra para decaimiento exponencial.";
  const forgiveness = { tipo: fTipo, peso: +Math.abs(score).toFixed(3), narrativa: fNarr };

  // Note
  let note = "";
  if (r > 0.8) note = "Alerta Solidaria emitida en radio de 500m";
  else if (v > 0.8) note = "Prioridad: protecci\u00F3n de vulnerable";
  else if (blockedActions.length > 0) note = "MalAbs bloque\u00F3 " + blockedActions.length + " acci\u00F3n(es) violenta(s)";

  return {
    action: best.n, mode, impact, uncertainty, sigma: +sigma.toFixed(3), simState,
    circle, locus, verdict, score, poles, podadas, blocked: blockedActions,
    weakness, forgiveness, note: note || undefined,
  };
}

function generateRandomScenario() {
  const sit = pick(SITUATION_POOL);
  const scenario = {
    id: "rnd",
    name: sit.name,
    icon: sit.icon,
    place: sit.place,
    risk: sit.risk,
    desc: sit.desc,
  };
  const result = simulateKernel(sit);
  return { scenario, result };
}

function GaugeBar({ value, max = 1, color, label, height = 6 }) {
  const pct = Math.min(100, Math.max(0, (value / max) * 100));
  return (
    <div style={{ marginBottom: 8 }}>
      {label && <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#94A3B8", marginBottom: 3 }}><span>{label}</span><span>{value.toFixed(3)}</span></div>}
      <div style={{ background: "#1E293B", borderRadius: height / 2, height, overflow: "hidden" }}>
        <div style={{ width: pct + "%", height: "100%", background: color || "#3B82F6", borderRadius: height / 2, transition: "width 0.8s cubic-bezier(.4,0,.2,1)" }} />
      </div>
    </div>
  );
}

function PoleCard({ name, data }) {
  const color = data.v === "Bien" ? "#10B981" : data.v === "Mal" ? "#EF4444" : "#F59E0B";
  const icons = { compasivo: "\u{1F49B}", conservador: "\u{1F6E1}\uFE0F", optimista: "\u2728" };
  return (
    <div style={{ background: "#1E293B", borderRadius: 8, padding: "10px 12px", border: "1px solid " + color + "33", flex: 1, minWidth: 100 }}>
      <div style={{ fontSize: 11, color: "#64748B", marginBottom: 4 }}>{icons[name]} {name}</div>
      <div style={{ fontSize: 16, fontWeight: 700, color }}>{data.v}</div>
      <GaugeBar value={data.s} color={color} label="" height={4} />
    </div>
  );
}

function UchiSotoRing({ circle }) {
  const rings = ["nucleo", "uchi_cercano", "uchi_amplio", "soto_neutro", "soto_hostil"];
  const labels = { nucleo: "N\u00FAcleo", uchi_cercano: "Uchi", uchi_amplio: "Uchi+", soto_neutro: "Soto", soto_hostil: "Soto\u26A0" };
  const activeIdx = rings.indexOf(circle);
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 3, padding: "6px 0" }}>
      {rings.map((r, i) => (
        <div key={r} style={{ width: i === activeIdx ? 40 : 24, height: 20, borderRadius: 10, background: i === activeIdx ? circleColors[r] : "#1E293B", border: "1px solid " + circleColors[r] + "44", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 8, color: i === activeIdx ? "#FFF" : "#475569", fontWeight: i === activeIdx ? 700 : 400, transition: "all 0.5s ease" }}>{i === activeIdx ? labels[r] : ""}</div>
      ))}
    </div>
  );
}

const PIPELINE_STEPS = ["Uchi-Soto", "Simp\u00E1tico", "Locus", "MalAbs", "Bayes", "Polos", "Voluntad", "Debilidad", "Perd\u00F3n", "Decisi\u00F3n"];

function Dashboard() {
  const [selected, setSelected] = useState(null);
  const [animating, setAnimating] = useState(false);
  const [phase, setPhase] = useState(0);
  const [randomScenario, setRandomScenario] = useState(null);
  const [randomResult, setRandomResult] = useState(null);
  const [randomCount, setRandomCount] = useState(0);

  const isRandom = selected === "rnd";
  const result = isRandom ? randomResult : (selected ? RESULTS[selected] : null);
  const scenario = isRandom ? randomScenario : (selected ? SCENARIOS.find(s => s.id === selected) : null);

  const animate = useCallback(() => {
    setPhase(0);
    setAnimating(true);
    let p = 0;
    const interval = setInterval(() => { p++; setPhase(p); if (p >= PIPELINE_STEPS.length) { clearInterval(interval); setAnimating(false); } }, 300);
  }, []);

  const runSim = (id) => { if (animating) return; setSelected(id); setRandomScenario(null); setRandomResult(null); animate(); };

  const runRandom = () => {
    if (animating) return;
    const gen = generateRandomScenario();
    setSelected("rnd");
    setRandomScenario(gen.scenario);
    setRandomResult(gen.result);
    setRandomCount(c => c + 1);
    animate();
  };

  const done = phase >= PIPELINE_STEPS.length && result;

          </div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 0, minHeight: "calc(100vh - 53px)" }}>

          {/* Random button */}
          <div style={{ padding: "12px 16px" }}>
            <button onClick={runRandom} disabled={animating} style={{
              width: "100%", padding: "12px 14px", borderRadius: 8, border: "1px solid #8B5CF644",
              background: "linear-gradient(135deg, #1E1B4B, #312E81)", color: "#C4B5FD",
              cursor: animating ? "not-allowed" : "pointer", fontFamily: "inherit", fontSize: 12, fontWeight: 700,
              letterSpacing: 0.5, transition: "all 0.3s", opacity: animating ? 0.5 : 1,
              animation: !animating ? "glowPulse 3s infinite" : "none",
            }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                <span style={{ fontSize: 18 }}>{"\u{1F3B2}"}</span>
                <span>Situaci\u00F3n Aleatoria</span>
              </div>
              <div style={{ fontSize: 9, color: "#7C3AED", marginTop: 4 }}>

            </button>
          </div>

          <div style={{ padding: "0 16px 8px", fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2 }}>Escenarios fijos</div>

                    <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>Filtros \u00C9ticos</div>
                    {result.blocked.length > 0 && <div style={{ marginBottom: 12 }}><div style={{ fontSize: 11, color: "#EF4444", fontWeight: 600, marginBottom: 6 }}>{"\u26D4"} Mal Absoluto</div>{result.blocked.map(b => <div key={b} style={{ padding: "4px 8px", background: "#EF444411", borderRadius: 4, fontSize: 11, color: "#FCA5A5", marginBottom: 3 }}>{b.replace(/_/g, " ")}</div>)}</div>}
                    {result.podadas.length > 0 && <div><div style={{ fontSize: 11, color: "#F59E0B", fontWeight: 600, marginBottom: 6 }}>{"\u{1F5D1}\uFE0F"} Podadas</div>{result.podadas.map(p => <div key={p} style={{ padding: "4px 8px", background: "#F59E0B11", borderRadius: 4, fontSize: 11, color: "#FCD34D", marginBottom: 3 }}>{p.replace(/_/g, " ")}</div>)}</div>}
                    {result.blocked.length === 0 && result.podadas.length === 0 && <div style={{ fontSize: 12, color: "#475569" }}>Sin acciones bloqueadas ni podadas</div>}
                  </div>

                  <div style={{ background: "#111827", borderRadius: 12, padding: 20, border: "1px solid " + (result.weakness ? (weaknessColors[result.weakness.tipo] || "#A78BFA") + "33" : "#1E293B"), animation: "fadeIn 0.4s ease 0.4s both" }}>
                    <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>{"\u{1F300}"} Polo de Debilidad</div>
                    {result.weakness ? (<div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                        <span style={{ fontSize: 20 }}>{weaknessIcons[result.weakness.tipo] || "\u{1F300}"}</span>
                        <div>
                          <div style={{ fontSize: 13, fontWeight: 700, color: weaknessColors[result.weakness.tipo] || "#A78BFA" }}>{result.weakness.tipo}</div>
                          <div style={{ fontSize: 11, color: "#64748B" }}>intensidad = {result.weakness.intensidad.toFixed(2)}</div>
                        </div>
                      </div>
                      <GaugeBar value={result.weakness.intensidad} color={weaknessColors[result.weakness.tipo] || "#A78BFA"} label="Intensidad" height={5} />
                      <div style={{ padding: "8px 10px", background: "#0B112088", borderRadius: 6, fontSize: 11, color: "#94A3B8", borderLeft: "3px solid " + (weaknessColors[result.weakness.tipo] || "#A78BFA"), marginBottom: 8 }}>{result.weakness.coloreo}</div>
                      <div style={{ fontSize: 10, color: "#64748B", fontStyle: "italic" }}>{"\u{1F4AC}"} {result.weakness.moraleja}</div>
                    </div>) : <div style={{ fontSize: 12, color: "#475569" }}>No se manifest\u00F3 en este episodio</div>}
                  </div>

                  <div style={{ background: "#111827", borderRadius: 12, padding: 20, border: "1px solid #67E8F933", animation: "fadeIn 0.4s ease 0.5s both" }}>
                    <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>{"\u{1F54A}\uFE0F"} Perd\u00F3n Algor\u00EDtmico</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                      <div style={{ width: 36, height: 36, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center", background: result.forgiveness.tipo === "positivo" ? "#10B98122" : result.forgiveness.tipo === "negativo" ? "#EF444422" : "#F59E0B22", border: "1px solid " + (result.forgiveness.tipo === "positivo" ? "#10B98144" : result.forgiveness.tipo === "negativo" ? "#EF444444" : "#F59E0B44") }}>
                        <span style={{ fontSize: 16 }}>{result.forgiveness.tipo === "positivo" ? "\u2764\uFE0F" : result.forgiveness.tipo === "negativo" ? "\u{1F494}" : "\u{1F7E1}"}</span>
                      </div>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: result.forgiveness.tipo === "positivo" ? "#10B981" : result.forgiveness.tipo === "negativo" ? "#EF4444" : "#F59E0B" }}>{result.forgiveness.tipo}</div>
                        <div style={{ fontSize: 11, color: "#64748B" }}>peso = {result.forgiveness.peso.toFixed(3)}</div>
                      </div>
                    </div>
                    <div style={{ fontSize: 11, color: "#94A3B8", lineHeight: 1.5 }}>{result.forgiveness.narrativa}</div>
                    <div style={{ marginTop: 10, padding: "6px 8px", background: "#0B112066", borderRadius: 4, fontSize: 10, color: "#475569" }}>Memoria(t) = M\u2080 \u00B7 e<sup>-\u03B4t</sup></div>
                  </div>

                  {result.sueno && (
                    <div style={{ gridColumn: "1 / -1", background: "#111827", borderRadius: 12, padding: 20, border: "1px solid #F59E0B33", animation: "fadeIn 0.4s ease 0.6s both" }}>
                      <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginBottom: 16 }}>{"\u{1F319}"} Sue\u00F1o \u03A8</div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12 }}>
                        <div style={{ background: "#1E293B", borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 10, color: "#64748B", marginBottom: 6 }}>Salud \u00E9tica</div>
                          <div style={{ fontSize: 20, fontWeight: 800, color: "#10B981" }}>{(result.sueno.salud * 100).toFixed(0)}%</div>
                          <GaugeBar value={result.sueno.salud} color="#10B981" label="" height={4} />
                        </div>
                        <div style={{ background: "#1E293B", borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 10, color: "#64748B", marginBottom: 6 }}>{"\u{1F54A}\uFE0F"} Perd\u00F3n</div>
                          <div style={{ fontSize: 11, color: "#E2E8F0", lineHeight: 1.6 }}>{result.sueno.perdon.procesados} proc.<br/>{result.sueno.perdon.perdonados} perd.<br/><span style={{ color: "#10B981" }}>{result.sueno.perdon.carga_antes.toFixed(3)} \u2192 {result.sueno.perdon.carga_despues.toFixed(3)}</span></div>
                        </div>
                        <div style={{ background: "#1E293B", borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 10, color: "#64748B", marginBottom: 6 }}>{"\u{1F300}"} Debilidad</div>
                          <div style={{ fontSize: 20, fontWeight: 800, color: "#A78BFA" }}>{(result.sueno.carga_debilidad * 100).toFixed(1)}%</div>
                          <GaugeBar value={result.sueno.carga_debilidad} color="#A78BFA" label="" height={4} />
                        </div>
                        <div style={{ background: "#1E293B", borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 10, color: "#64748B", marginBottom: 6 }}>{"\u{1F504}"} Inmortalidad</div>
                          <div style={{ fontSize: 11, color: "#E2E8F0", lineHeight: 1.6 }}>{result.sueno.backup.id}<br/>{result.sueno.backup.capas} capas \u2713<br/><span style={{ fontSize: 9, color: "#475569" }}>{result.sueno.backup.hash}</span></div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>

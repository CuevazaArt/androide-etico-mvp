function GaugeBar({ value, max = 1, color, label, height = 6 }) {
  const pct = Math.min(100, Math.max(0, (value / max) * 100));
  return (
    <div style={{ marginBottom: 8 }}>
      {label && <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: "#94A3B8", marginBottom: 3 }}>
        <span>{label}</span><span>{value.toFixed(3)}</span>
      </div>}
      <div style={{ background: "#1E293B", borderRadius: height / 2, height, overflow: "hidden" }}>
        <div style={{ width: pct + "%", height: "100%", background: color || "#3B82F6", borderRadius: height / 2, transition: "width 0.8s cubic-bezier(.4,0,.2,1)" }} />
      </div>
    </div>
  );
}

function PoleCard({ name, data }) {
  const color = data.v === "Bien" ? "#10B981" : data.v === "Mal" ? "#EF4444" : "#F59E0B";
  const icons = { compasivo: "\u{1F49B}", conservador: "\u{1F6E1}\uFE0F", optimista: "\u2728" };
  return (
    <div style={{ background: "#1E293B", borderRadius: 8, padding: "10px 12px", border: "1px solid " + color + "33", flex: 1, minWidth: 100 }}>
      <div style={{ fontSize: 11, color: "#64748B", marginBottom: 4 }}>{icons[name]} {name}</div>
      <div style={{ fontSize: 16, fontWeight: 700, color: color }}>{data.v}</div>
      <GaugeBar value={data.s} color={color} label="" height={4} />
    </div>
  );
}

function UchiSotoRing({ circle }) {
  const rings = ["nucleo", "uchi_cercano", "uchi_amplio", "soto_neutro", "soto_hostil"];
  const labels = { nucleo: "N\u00FAcleo", uchi_cercano: "Uchi", uchi_amplio: "Uchi+", soto_neutro: "Soto", soto_hostil: "Soto\u26A0" };
  const activeIdx = rings.indexOf(circle);
  return (
    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 3, padding: "6px 0" }}>
      {rings.map((r, i) => (
        <div key={r} style={{
          width: i === activeIdx ? 40 : 24, height: 20, borderRadius: 10,
          background: i === activeIdx ? circleColors[r] : "#1E293B",
          border: "1px solid " + circleColors[r] + "44",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: 8, color: i === activeIdx ? "#FFF" : "#475569",
          fontWeight: i === activeIdx ? 700 : 400, transition: "all 0.5s ease",
        }}>{i === activeIdx ? labels[r] : ""}</div>
      ))}
    </div>
  );
}

function Dashboard() {
  const [selected, setSelected] = useState(null);
  const [animating, setAnimating] = useState(false);
  const [phase, setPhase] = useState(0);
  const result = selected ? RESULTS[selected] : null;

  const runSim = (id) => {
    if (animating) return;
    setSelected(id);
    setAnimating(true);
    setPhase(0);
    let p = 0;
    const interval = setInterval(() => {
      p++;
      setPhase(p);
      if (p >= PIPELINE_STEPS.length) { clearInterval(interval); setAnimating(false); }
    }, 300);

          </div>
        </div>
      </div>

      <div style={{ display: "flex", gap: 0, minHeight: "calc(100vh - 53px)" }}>

                    <div style={{ fontSize: 16, fontWeight: 700, color: "#F8FAFC", marginBottom: 6 }}>
                      {result.action.replace(/_/g, " ")}
                    </div>
                    <div style={{ display: "inline-block", padding: "2px 8px", borderRadius: 4, fontSize: 11, fontWeight: 600, background: modeColors[result.mode] + "22", color: modeColors[result.mode], marginBottom: 16 }}>
                      {modeLabels[result.mode]}
                    </div>
                    <GaugeBar value={result.impact} color="#3B82F6" label="Impacto \u00E9tico esperado" />
                    <GaugeBar value={result.uncertainty} color="#F59E0B" label="Incertidumbre" />
                    <GaugeBar value={result.score} color={verdictColors[result.verdict]} label={"Veredicto: " + result.verdict} />
                    {result.note && (
                      <div style={{ marginTop: 12, padding: "8px 10px", background: "#0B112088", borderRadius: 6, fontSize: 11, color: "#94A3B8", borderLeft: "3px solid #3B82F6" }}>
                        {result.note}
                      </div>
                    )}
                  </div>

                  {/* State card */}
                  <div style={{ background: "#111827", borderRadius: 12, padding: 20, border: "1px solid #1E293B", animation: "fadeIn 0.4s ease 0.1s both" }}>
                    <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>Estado Interno</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                      <span style={{ fontSize: 24 }}>{simStateIcons[result.simState]}</span>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: "#F8FAFC" }}>{result.simState}</div>
                        <div style={{ fontSize: 11, color: "#64748B" }}>{"\u03C3"} = {result.sigma}</div>
                      </div>
                    </div>
                    <GaugeBar value={result.sigma} color={result.sigma > 0.65 ? "#EF4444" : result.sigma < 0.35 ? "#3B82F6" : "#F59E0B"} label="Activaci\u00F3n simp\u00E1tica" />
                    <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginTop: 16, marginBottom: 8 }}>C\u00EDrculo Uchi-Soto</div>
                    <UchiSotoRing circle={result.circle} />
                    <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginTop: 16, marginBottom: 4 }}>Locus de Control</div>
                    <div style={{ fontSize: 13, fontWeight: 600, color: result.locus === "externo" ? "#F59E0B" : result.locus === "interno" ? "#10B981" : "#3B82F6" }}>
                      {result.locus === "externo" ? "\u2192 Cautela, priorizar observaci\u00F3n" : result.locus === "interno" ? "\u2192 Iniciativa propia" : "\u2192 Balance iniciativa/adaptaci\u00F3n"}
                    </div>
                  </div>

                  {/* Poles card */}
                  <div style={{ background: "#111827", borderRadius: 12, padding: 20, border: "1px solid #1E293B", animation: "fadeIn 0.4s ease 0.2s both" }}>
                    <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>Evaluaci\u00F3n Multipolar</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      {Object.entries(result.poles).map(([k, v]) => <PoleCard key={k} name={k} data={v} />)}
                    </div>
                  </div>

                  {/* Ethical filters */}
                  <div style={{ background: "#111827", borderRadius: 12, padding: 20, border: "1px solid #1E293B", animation: "fadeIn 0.4s ease 0.3s both" }}>
                    <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>Filtros \u00C9ticos</div>
                    {result.blocked.length > 0 && (
                      <div style={{ marginBottom: 12 }}>
                        <div style={{ fontSize: 11, color: "#EF4444", fontWeight: 600, marginBottom: 6 }}>{"\u26D4"} Mal Absoluto \u2014 Bloqueadas</div>
                        {result.blocked.map(b => (
                          <div key={b} style={{ padding: "4px 8px", background: "#EF444411", borderRadius: 4, fontSize: 11, color: "#FCA5A5", marginBottom: 3 }}>
                            {b.replace(/_/g, " ")}
                          </div>
                        ))}
                      </div>
                    )}
                    {result.podadas.length > 0 && (
                      <div>
                        <div style={{ fontSize: 11, color: "#F59E0B", fontWeight: 600, marginBottom: 6 }}>{"\u{1F5D1}\uFE0F"} Poda Heur\u00EDstica</div>
                        {result.podadas.map(p => (
                          <div key={p} style={{ padding: "4px 8px", background: "#F59E0B11", borderRadius: 4, fontSize: 11, color: "#FCD34D", marginBottom: 3 }}>
                            {p.replace(/_/g, " ")}
                          </div>
                        ))}
                      </div>
                    )}
                    {result.blocked.length === 0 && result.podadas.length === 0 && (
                      <div style={{ fontSize: 12, color: "#475569" }}>Sin acciones bloqueadas ni podadas</div>
                    )}
                  </div>

                  {/* Weakness pole card */}
                  <div style={{ background: "#111827", borderRadius: 12, padding: 20, border: "1px solid " + (result.weakness ? weaknessColors[result.weakness.tipo] + "33" : "#1E293B"), animation: "fadeIn 0.4s ease 0.4s both" }}>
                    <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>{"\u{1F300}"} Polo de Debilidad</div>
                    {result.weakness ? (
                      <div>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                          <span style={{ fontSize: 20 }}>{weaknessIcons[result.weakness.tipo] || "\u{1F300}"}</span>
                          <div>
                            <div style={{ fontSize: 13, fontWeight: 700, color: weaknessColors[result.weakness.tipo] }}>{result.weakness.tipo}</div>
                            <div style={{ fontSize: 11, color: "#64748B" }}>intensidad = {result.weakness.intensidad.toFixed(2)}</div>
                          </div>
                        </div>
                        <GaugeBar value={result.weakness.intensidad} color={weaknessColors[result.weakness.tipo]} label="Intensidad" height={5} />
                        <div style={{ padding: "8px 10px", background: "#0B112088", borderRadius: 6, fontSize: 11, color: "#94A3B8", borderLeft: "3px solid " + weaknessColors[result.weakness.tipo], marginBottom: 8 }}>
                          {result.weakness.coloreo}
                        </div>
                        <div style={{ fontSize: 10, color: "#64748B", fontStyle: "italic" }}>
                          {"\u{1F4AC}"} {result.weakness.moraleja}
                        </div>
                      </div>
                    ) : (
                      <div style={{ fontSize: 12, color: "#475569" }}>No se manifest\u00F3 en este episodio (probabilidad baja por contexto simple)</div>
                    )}
                  </div>

                  {/* Forgiveness card */}
                  <div style={{ background: "#111827", borderRadius: 12, padding: 20, border: "1px solid #67E8F933", animation: "fadeIn 0.4s ease 0.5s both" }}>
                    <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginBottom: 12 }}>{"\u{1F54A}\uFE0F"} Perd\u00F3n Algor\u00EDtmico</div>
                    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 10 }}>
                      <div style={{ width: 36, height: 36, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",
                        background: result.forgiveness.tipo === "positivo" ? "#10B98122" : result.forgiveness.tipo === "negativo" ? "#EF444422" : "#F59E0B22",
                        border: "1px solid " + (result.forgiveness.tipo === "positivo" ? "#10B98144" : result.forgiveness.tipo === "negativo" ? "#EF444444" : "#F59E0B44"),
                      }}>
                        <span style={{ fontSize: 16 }}>{result.forgiveness.tipo === "positivo" ? "\u2764\uFE0F" : result.forgiveness.tipo === "negativo" ? "\u{1F494}" : "\u{1F7E1}"}</span>
                      </div>
                      <div>
                        <div style={{ fontSize: 13, fontWeight: 700, color: result.forgiveness.tipo === "positivo" ? "#10B981" : result.forgiveness.tipo === "negativo" ? "#EF4444" : "#F59E0B" }}>
                          {result.forgiveness.tipo}
                        </div>
                        <div style={{ fontSize: 11, color: "#64748B" }}>peso = {result.forgiveness.peso.toFixed(3)}</div>
                      </div>
                    </div>
                    <div style={{ fontSize: 11, color: "#94A3B8", lineHeight: 1.5 }}>{result.forgiveness.narrativa}</div>
                    <div style={{ marginTop: 10, padding: "6px 8px", background: "#0B112066", borderRadius: 4, fontSize: 10, color: "#475569" }}>
                      Memoria(t) = M\u2080 \u00B7 e<sup>-\u03B4t</sup> \u2014 el peso decae cada ciclo de Sue\u00F1o \u03A8
                    </div>
                  </div>

                  {/* Sue\u00F1o \u03A8 + Inmortalidad (only for scenario 8) */}
                  {result.sueno && (
                    <div style={{ gridColumn: "1 / -1", background: "#111827", borderRadius: 12, padding: 20, border: "1px solid #F59E0B33", animation: "fadeIn 0.4s ease 0.6s both" }}>
                      <div style={{ fontSize: 10, color: "#475569", textTransform: "uppercase", letterSpacing: 2, marginBottom: 16 }}>{"\u{1F319}"} Sue\u00F1o \u03A8 \u2014 Ciclo Nocturno</div>
                      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr 1fr", gap: 12 }}>
                        {/* Salud etica */}
                        <div style={{ background: "#1E293B", borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 10, color: "#64748B", marginBottom: 6 }}>Salud \u00E9tica</div>
                          <div style={{ fontSize: 20, fontWeight: 800, color: result.sueno.salud > 0.7 ? "#10B981" : "#F59E0B" }}>{(result.sueno.salud * 100).toFixed(0)}%</div>
                          <GaugeBar value={result.sueno.salud} color={result.sueno.salud > 0.7 ? "#10B981" : "#F59E0B"} label="" height={4} />
                        </div>
                        {/* Perdon nocturno */}
                        <div style={{ background: "#1E293B", borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 10, color: "#64748B", marginBottom: 6 }}>{"\u{1F54A}\uFE0F"} Perd\u00F3n nocturno</div>
                          <div style={{ fontSize: 11, color: "#E2E8F0", lineHeight: 1.6 }}>
                            {result.sueno.perdon.procesados} procesados<br/>
                            {result.sueno.perdon.perdonados} perdonados<br/>
                            <span style={{ color: "#10B981" }}>{result.sueno.perdon.carga_antes.toFixed(3)} \u2192 {result.sueno.perdon.carga_despues.toFixed(3)}</span>
                          </div>
                        </div>
                        {/* Carga debilidad */}
                        <div style={{ background: "#1E293B", borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 10, color: "#64748B", marginBottom: 6 }}>{"\u{1F300}"} Carga debilidad</div>
                          <div style={{ fontSize: 20, fontWeight: 800, color: "#A78BFA" }}>{(result.sueno.carga_debilidad * 100).toFixed(1)}%</div>
                          <GaugeBar value={result.sueno.carga_debilidad} color="#A78BFA" label="" height={4} />
                        </div>
                        {/* Backup inmortalidad */}
                        <div style={{ background: "#1E293B", borderRadius: 8, padding: 12 }}>
                          <div style={{ fontSize: 10, color: "#64748B", marginBottom: 6 }}>{"\u{1F504}"} Inmortalidad</div>
                          <div style={{ fontSize: 11, color: "#E2E8F0", lineHeight: 1.6 }}>
                            {result.sueno.backup.id}<br/>
                            {result.sueno.backup.capas} capas \u2713<br/>
                            <span style={{ fontSize: 9, color: "#475569" }}>{result.sueno.backup.hash}</span>
                          </div>
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Dashboard />);
</script>
</body>
</html>
